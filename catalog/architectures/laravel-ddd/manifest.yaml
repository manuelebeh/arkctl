schema_version: 1

id: laravel-ddd
name: Laravel modular DDD
version: 0.1.0
description: >
  Laravel modular monolith with DDD layers per bounded context under
  app/Domains/{Domain}/{Domain,Application,Infrastructure}/.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [laravel, php]
  languages: [php]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
