naming:
  modules:
    pattern: "^[A-Z][A-Za-z0-9]*$"
  files:
    tests: "**/*Test.php"

placement:
  cross_module_imports: false
  public_api: app/Domains/:name/Application/**

imports:
  deny:
    - from: app/Domains/*/Domain/**
      to: app/Domains/*/Infrastructure/**
    - from: app/Domains/*/Domain/**
      to: app/Domains/*/Application/**
  allow:
    - from: app/Domains/*
      to: app/Domains/*/Application/**
    - from: app/Domains/*/Application/**
      to: app/Domains/*/Domain/**
    - from: app/Domains/*/Infrastructure/**
      to: app/Domains/*/Domain/**
    - from: app/Domains/*/Infrastructure/**
      to: app/Domains/*/Application/**
    - from: app/Domains/*
      to: app/Shared/**
    - from: "**"
      to: app/Shared/**

tests:
  colocate: true
