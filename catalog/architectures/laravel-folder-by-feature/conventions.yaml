naming:
  modules:
    pattern: "^[A-Z][A-Za-z0-9]*$"
  files:
    tests: "**/*Test.php"

placement:
  cross_module_imports: false
  public_api: app/:name/Routes/routes.php

imports:
  deny: []
  allow:
    - from: app/*
      to: app/*/Routes/routes.php
    - from: app/*
      to: shared/**

tests:
  colocate: true
