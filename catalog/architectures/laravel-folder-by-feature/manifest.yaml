schema_version: 1

id: laravel-folder-by-feature
name: Laravel folder-by-feature
version: 0.1.0
description: >
  Laravel app organized by feature under app/{Feature}/.
  Controllers, models, and routes live with the feature, not by technical type.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [laravel, php]
  languages: [php]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
