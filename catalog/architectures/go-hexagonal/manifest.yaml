schema_version: 1

id: go-hexagonal
name: Go hexagonal
version: 0.1.0
description: >
  Go hexagonal layout under internal/: domain, application, adapters (inbound/outbound).

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [go]
  languages: [go]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
