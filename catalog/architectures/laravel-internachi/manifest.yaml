schema_version: 1

id: laravel-internachi
name: Laravel packages (InterNACHI)
version: 0.1.0
description: >
  Laravel modular monolith using internachi/modular.
  Each module under app-modules/{module}/ is a Composer path package.

requires:
  project_manifest: ">=1"

applies_to:
  stacks: [laravel, php]
  languages: [php]

files:
  layout: LAYOUT.md
  tree: tree.schema.yaml
  conventions: conventions.yaml
  agent_hints: agents.hints.yaml

checks:
  - tree
  - conventions
  - forbidden_paths
  - required_files

default_severity: error
severity:
  missing-root: error
  forbidden-path: error
  module-naming: warn
  missing-module-file: error
  denied-import: error
  cross-module-import: error
