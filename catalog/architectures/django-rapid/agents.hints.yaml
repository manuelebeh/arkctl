recommended_agents:
  - id: architecture-guardian
    reason: Reviews RAPID layer boundaries (data / interfaces / readers / actions)
  - id: django-best-practices
    reason: Django apps, settings, views, auth, security, testing
  - id: django-orm
    reason: Models, migrations, QuerySets, admin, transactions

brief: |
  Follow Django RAPID.
  Put models in data/, HTTP in interfaces/, reads in readers/, writes in actions/.
  Do not recreate vertical project apps under apps/.
